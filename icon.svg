<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#0a0a0a"/>

  <!-- Golden top bar -->
  <rect x="0" y="0" width="512" height="5" fill="#e8c547"/>

  <!-- "KB" monogram -->
  <text
    x="256"
    y="285"
    font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
    font-size="220"
    font-weight="800"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="middle">KB</text>

  <!-- Golden underline accent -->
  <rect x="170" y="360" width="172" height="4" rx="2" fill="#e8c547"/>

  <!-- Subtitle -->
  <text
    x="256"
    y="420"
    font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
    font-size="34"
    font-weight="400"
    fill="#888888"
    text-anchor="middle">VJEŽBE</text>
</svg>
